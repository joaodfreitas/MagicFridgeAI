<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Alimento — MagicFridgeAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <span style="font-size:1.4rem">🧊</span>
    <h1>Magic<span class="accent">Fridge</span>AI</h1>
</header>

<div class="container">
    <div class="card">

        <p class="card-title">➕ Novo Alimento</p>
        <p class="card-subtitle">Preencha os dados do item a ser adicionado à geladeira.</p>

        <hr class="divider">

        <form id="foodForm">

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Ex: Tomate, Frango, Leite..." required>
            </div>

            <div class="form-group">
                <label for="categoria">Categoria</label>
                <select id="categoria">
                    <option value="FRUTA">🍎 Fruta</option>
                    <option value="VEGETAL">🥦 Vegetal</option>
                    <option value="LEGUME">🥕 Legume</option>
                    <option value="LATICINIO">🧀 Laticínio</option>
                    <option value="CARNE">🥩 Carne</option>
                    <option value="BEBIDA">🥤 Bebida</option>
                    <option value="GRAO">🌾 Grão</option>
                    <option value="OUTROS">📦 Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" placeholder="Ex: 3" min="1">
            </div>

            <div class="form-group">
                <label for="validade">Data de Validade</label>
                <input type="date" id="validade">
            </div>

            <div class="btn-group">
                <button class="btn" type="submit" id="submitBtn">
                    💾 Salvar Alimento
                </button>
                <a href="/foods" class="btn btn-ghost">Cancelar</a>
            </div>

        </form>

    </div>
</div>

<script>
    document.getElementById("foodForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");
        btn.innerHTML = '<span class="loading"></span> Salvando...';
        btn.disabled = true;

        const food = {
            nome: document.getElementById("nome").value,
            categoria: document.getElementById("categoria").value,
            quantidade: parseInt(document.getElementById("quantidade").value),
            validade: document.getElementById("validade").value
        };

        try {
            await fetch("/food", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(food)
            });
            window.location.href = "/foods";
        } catch (err) {
            alert("Erro ao salvar. Tente novamente.");
            btn.innerHTML = '💾 Salvar Alimento';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
