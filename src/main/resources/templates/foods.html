<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Geladeira — MagicFridgeAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <span style="font-size:1.4rem">🧊</span>
    <h1>Magic<span class="accent">Fridge</span>AI</h1>
</header>

<div class="container">
    <div class="card">

        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px;">
            <div>
                <p class="card-title">Minha Geladeira</p>
                <p class="card-subtitle">Alimentos cadastrados</p>
            </div>
            <div class="btn-group" style="margin:0;">
                <a href="/novo" class="btn">➕ Adicionar</a>
                <a href="/" class="btn btn-ghost">← Voltar</a>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Qtd.</th>
                    <th>Validade</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="food : ${foods}">
                    <td>
                        <span style="font-weight:600;" th:text="${food.nome}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="'badge-' + ${food.categoria}" th:text="${food.categoria}"></span>
                    </td>
                    <td th:text="${food.quantidade}"></td>
                    <td th:text="${food.validade}"></td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
